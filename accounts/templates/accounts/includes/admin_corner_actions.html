<div class="flex flex-wrap items-center justify-end gap-3">
    <a class="inline-flex items-center justify-center rounded-full px-4 py-2 text-sm font-semibold transition {% if admin_page == 'profile' %}bg-slate-950 text-white shadow-sm{% else %}bg-white text-slate-700 hover:bg-slate-100{% endif %}" href="{% url 'admin_profile' %}">
        My Profile
    </a>
    <a class="inline-flex items-center justify-center rounded-full px-4 py-2 text-sm font-semibold transition {% if admin_page == 'settings' %}bg-slate-950 text-white shadow-sm{% else %}bg-white text-slate-700 hover:bg-slate-100{% endif %}" href="{% url 'admin_settings' %}">
        Settings
    </a>
    <div class="flex items-center gap-3 rounded-full border border-slate-200 bg-slate-50 px-3 py-2">
        <div class="flex h-11 w-11 items-center justify-center rounded-full bg-slate-950 text-sm font-bold uppercase text-white">
            {{ request.user.username|slice:":2"|upper }}
        </div>
        <div class="text-left">
            <p class="text-[10px] font-semibold uppercase tracking-[0.24em] text-slate-400">{{ request.user.portal_role_display }}</p>
            <p class="text-sm font-semibold text-slate-900">{{ request.user.username }}</p>
        </div>
    </div>
    <a class="inline-flex items-center justify-center rounded-full bg-gradient-to-r from-amber-500 via-yellow-500 to-amber-600 px-5 py-2.5 text-sm font-semibold text-slate-950 shadow-sm transition duration-200 hover:-translate-y-0.5 hover:shadow-md" href="{% url 'logout' %}">
        Log Out
    </a>
</div>
